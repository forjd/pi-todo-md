name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package version
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const tag = process.env.GITHUB_REF_NAME;
          const expected = `v${pkg.version}`;
          if (tag !== expected) {
            console.error(`Tag ${tag} does not match package.json version ${pkg.version}`);
            process.exit(1);
          }
          console.log(`Tag ${tag} matches package.json version ${pkg.version}`);
          EOF

      - name: Run tests
        run: npm test

      - name: Pack release tarball
        run: npm pack

      - name: Show npm auth mode
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            echo "Using NPM_TOKEN secret for publish."
          else
            echo "No NPM_TOKEN secret set; expecting npm trusted publishing via GitHub OIDC."
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tgz
